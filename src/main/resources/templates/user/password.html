<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4" style="max-width: 500px;">
    <h2>비밀번호 변경</h2>

    <form th:action="@{/user/password}" th:object="${passwordChangeDto}" method="post">

        <div class="mb-3">
            <label class="form-label">현재 비밀번호</label>
            <input type="password" class="form-control" th:field="*{currentPassword}"
                   th:classappend="${#fields.hasErrors('currentPassword')} ? 'is-invalid'"/>
            <div class="invalid-feedback" th:errors="*{currentPassword}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">새 비밀번호 (8자 이상)</label>
            <input type="password" class="form-control" th:field="*{newPassword}"
                   th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid'"/>
            <div class="invalid-feedback" th:errors="*{newPassword}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">새 비밀번호 확인</label>
            <input type="password" class="form-control" th:field="*{confirmPassword}"
                   th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"/>
            <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">변경 완료</button>
            <a th:href="@{/home}" class="btn btn-secondary">취소</a>
        </div>
    </form>
</div>

<!-- 푸터 -->
<footer class="text-center text-muted mt-5 mb-3 border-top pt-3">
    <p>
        실습 수행 일시:
        <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 HH:mm:ss')}"></span>
        &nbsp;│&nbsp; 학번: 2291039 &nbsp;│&nbsp; 성명: 조윤경
    </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
