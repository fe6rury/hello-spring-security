<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상품 수정</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4" style="max-width: 600px;">
    <h2>상품 수정</h2>

    <form th:action="@{/products/{id}/edit(id=${productId})}"
          th:object="${productDto}" method="post">

        <div class="mb-3">
            <label class="form-label">상품명</label>
            <input type="text" class="form-control" th:field="*{name}"
                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"/>
            <div class="invalid-feedback" th:errors="*{name}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">가격 (원)</label>
            <input type="number" class="form-control" th:field="*{price}"
                   th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'"/>
            <div class="invalid-feedback" th:errors="*{price}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">재고</label>
            <input type="number" class="form-control" th:field="*{stock}"
                   th:classappend="${#fields.hasErrors('stock')} ? 'is-invalid'"/>
            <div class="invalid-feedback" th:errors="*{stock}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">상품 설명</label>
            <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">수정 완료</button>
            <a th:href="@{/products}" class="btn btn-secondary">취소</a>
        </div>
    </form>
</div>

<!-- 푸터 -->
<footer class="text-center text-muted mt-5 mb-3 border-top pt-3">
    <p>
        실습 수행 일시:
        <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 HH:mm:ss')}"></span>
        &nbsp;│&nbsp; 학번: 2291039 &nbsp;│&nbsp; 성명: 조윤경
    </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
