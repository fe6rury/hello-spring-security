<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>상품 목록</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>상품 목록</h2>

    <!-- 성공 메시지 -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <!-- 총 상품 수 + 현재/전체 페이지 -->
    <small class="text-muted">
        총 <span th:text="${productPage.totalElements}"></span>개 상품
        (페이지 <span th:text="${productPage.number + 1}"></span>
               / <span th:text="${productPage.totalPages}"></span>)
    </small>

    <!-- 검색 폼 -->
    <form th:action="@{/products}" method="get" class="mb-3 d-flex gap-2 mt-2">
        <input type="text" name="keyword" class="form-control"
               placeholder="상품명으로 검색"
               th:value="${keyword}"/>
        <button type="submit" class="btn btn-primary px-4">검색</button>
        <a th:href="@{/products}" class="btn btn-outline-secondary">초기화</a>
    </form>

    <!-- ADMIN 전용 등록 버튼 -->
    <div sec:authorize="hasRole('ADMIN')" class="mb-3">
        <a th:href="@{/products/add}" class="btn btn-success">+ 상품 등록</a>
    </div>

    <!-- 빈 결과 처리 -->
    <div th:if="${productPage.isEmpty()}" class="alert alert-info">
        검색 결과가 없습니다.
    </div>

    <!-- 상품 테이블 -->
    <div th:unless="${productPage.isEmpty()}">
        <table class="table table-bordered table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>상품명</th>
                    <th>가격</th>
                    <th>재고</th>
                    <th>설명</th>
                    <th sec:authorize="hasRole('ADMIN')">관리</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${productPage.content}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.name}"></td>
                    <td th:text="${#numbers.formatInteger(p.price, 0, 'COMMA')} + '원'"></td>
                    <td>
                        <span th:if="${p.stock == 0}" class="badge bg-danger">품절</span>
                        <span th:unless="${p.stock == 0}" th:text="${p.stock}"></span>
                    </td>
                    <td th:text="${p.description}"></td>
                    <td sec:authorize="hasRole('ADMIN')">
                        <a th:href="@{/products/{id}/edit(id=${p.id})}"
                           class="btn btn-sm btn-warning">수정</a>
                        <form th:action="@{/products/{id}/delete(id=${p.id})}"
                              method="post" style="display:inline"
                              onsubmit="return confirm('삭제하시겠습니까?')">
                            <button type="submit" class="btn btn-sm btn-danger">삭제</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- 페이지 네비게이션 -->
    <nav class="mt-3" th:if="${productPage.totalPages > 0}">
        <ul class="pagination justify-content-center">
            <!-- 이전 버튼 -->
            <li class="page-item disabled" th:if="${!productPage.hasPrevious()}">
                <span class="page-link">이전</span>
            </li>
            <li class="page-item" th:unless="${!productPage.hasPrevious()}">
                <a class="page-link"
                   th:href="${keyword != null}
                       ? @{/products(page=${productPage.number - 1}, size=${productPage.size}, keyword=${keyword})}
                       : @{/products(page=${productPage.number - 1}, size=${productPage.size})}">이전</a>
            </li>

            <!-- 페이지 번호 -->
            <li th:each="i : ${#numbers.sequence(0, productPage.totalPages - 1)}"
                class="page-item"
                th:classappend="${i == productPage.number} ? 'active'">
                <a class="page-link"
                   th:href="${keyword != null}
                       ? @{/products(page=${i}, size=${productPage.size}, keyword=${keyword})}
                       : @{/products(page=${i}, size=${productPage.size})}"
                   th:text="${i + 1}"></a>
            </li>

            <!-- 다음 버튼 -->
            <li class="page-item disabled" th:if="${!productPage.hasNext()}">
                <span class="page-link">다음</span>
            </li>
            <li class="page-item" th:unless="${!productPage.hasNext()}">
                <a class="page-link"
                   th:href="${keyword != null}
                       ? @{/products(page=${productPage.number + 1}, size=${productPage.size}, keyword=${keyword})}
                       : @{/products(page=${productPage.number + 1}, size=${productPage.size})}">다음</a>
            </li>
        </ul>
    </nav>
</div>

<!-- 푸터: 날짜/시간 + 학번 + 성명 (필수!) -->
<footer class="text-center text-muted mt-5 mb-3 border-top pt-3">
    <p>
        실습 수행 일시:
        <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 HH:mm:ss')}"></span>
        &nbsp;│&nbsp; 학번: 2291039 &nbsp;│&nbsp; 성명: 조윤경
    </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
